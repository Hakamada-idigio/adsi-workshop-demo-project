spring:
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: attendance
    password: attendance

  flyway:
    locations: classpath:db/migration,classpath:db/migration-postgresql,classpath:db/seed

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003

logging:
  level:
    com.example.attendance: DEBUG
    org.springframework.security: DEBUG
